<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="#111111" />
  
  <!-- Outer glowing rings (Atomic electrons) -->
  <ellipse cx="256" cy="256" rx="90" ry="200" fill="none" stroke="#FF6B2B" stroke-width="24" stroke-opacity="0.3" transform="rotate(45 256 256)" />
  <ellipse cx="256" cy="256" rx="90" ry="200" fill="none" stroke="#FF6B2B" stroke-width="24" stroke-opacity="0.3" transform="rotate(-45 256 256)" />
  
  <ellipse cx="256" cy="256" rx="90" ry="200" fill="none" stroke="#FF6B2B" stroke-width="12" stroke-opacity="0.8" transform="rotate(45 256 256)" />
  <ellipse cx="256" cy="256" rx="90" ry="200" fill="none" stroke="#FF6B2B" stroke-width="12" stroke-opacity="0.8" transform="rotate(-45 256 256)" />

  <!-- Inner Bullseye / Nucleus -->
  <circle cx="256" cy="256" r="60" fill="#FF6B2B" />
  
  <!-- Central checkmark / Goal achieved -->
  <path d="M220 256L242 278L292 228" fill="none" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
</svg>
